<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lyrics Overlay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <p class="brand">Lyrics Overlay</p>
      <p class="status" id="status">Checking desktop app…</p>
      <div class="track" id="track" hidden>
        <p class="label">Now playing</p>
        <p class="song" id="song"></p>
        <p class="artist" id="artist"></p>
      </div>
      <p class="hint" id="hint">Keep the desktop app open while you watch YouTube.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
